name: Wöchentliches Datenbank-Backup

on:
  schedule:
    - cron: '0 2 * * 0'   # jeden Sonntag um 02:00 UTC
  workflow_dispatch:        # auch manuell auslösbar

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Supabase CLI installieren
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Datenbank-Backup erstellen
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          FILENAME="backup_$(date +%Y-%m-%d).sql"
          DB_URL="postgresql://postgres.${SUPABASE_PROJECT_REF}:${SUPABASE_DB_PASSWORD}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres"
          supabase db dump --db-url "$DB_URL" -f "$FILENAME"
          gzip "$FILENAME"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV

      - name: Backup als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
