name: Wöchentliches Datenbank-Backup

on:
  schedule:
    - cron: '0 2 * * 0'   # jeden Sonntag um 02:00 UTC
  workflow_dispatch:        # auch manuell auslösbar

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: PostgreSQL Client installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Verbindung prüfen (Debug)
        run: |
          URL="${{ secrets.SUPABASE_DB_URL }}"
          # Zeige nur Benutzername und Host, kein Passwort
          echo "Host: $(echo $URL | grep -oP '(?<=@)[^/]+')"
          echo "User: $(echo $URL | grep -oP '(?<=//)[^:@]+')"

      - name: Datenbank-Backup erstellen
        run: |
          FILENAME="backup_$(date +%Y-%m-%d).sql"
          pg_dump \
            "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner \
            --no-acl \
            -f "$FILENAME"
          gzip "$FILENAME"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV

      - name: Backup als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
